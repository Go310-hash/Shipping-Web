<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Shipping Tracking System"
    />
    <title>Shipping Tracker</title>
    <!-- Basic styles to ensure something displays -->
    <style>
      body { 
        margin: 0; 
        padding: 20px; 
        font-family: Arial, sans-serif; 
        background-color: #f5f5f5;
      }
      #root { 
        min-height: 80vh; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        text-align: center;
      }
      .loading {
        background: white;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loading">
        <h1>📦 Shipping Tracker</h1>
        <p>Loading application...</p>
        <p>If this persists, please ensure JavaScript is enabled and dependencies are installed.</p>
        <p><em>Make sure to run the setup as described in the README</em></p>
      </div>
    </div>
  </body>
</html>
